name: Build and Release (Windows & Android)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # 1. Job to build the Windows executable (.exe)
  build-windows:
    name: Build Windows App (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 'large'
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile and Build Web Assets
        run: npm run build

      # Electron Builder can package the app to an .exe installer
      - name: Build Windows Installer (.exe)
        run: |
          npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisabapp-windows-exe
          path: dist/*.exe

  # 2. Job to build the Android App (.apk)
  build-android:
    name: Build Android App (.apk)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Compile and Build Web Assets
        run: npm run build

      # Capacitor Sync to copy web assets to android platform
      - name: Capacitor Sync
        run: |
          npx cap sync android
        continue-on-error: true

      # Build APK using gradle wrapper in the android directory
      - name: Build Android Release APK
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "Android directory not found. Skipping APK build."
          fi
        continue-on-error: true

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisabapp-android-apk
          path: android/app/build/outputs/apk/release/*.apk
